# =============================================================================
# /etc/nginx/sites-available/youtrack
# Nginx reverse proxy configuration for YouTrack
# Based on official JetBrains reverse proxy documentation
# =============================================================================
#
# HTTP only (pre-HTTPS / no domain):
# - server_name: use VM public IP
# - listen: 80
#
# After domain + Let's Encrypt setup:
# - Replace listen 80 with listen 443 ssl
# - Add ssl_certificate directives
# - Add HTTP → HTTPS redirect server block
# =============================================================================

server {
    listen 80;
    server_name your domain or vm IP;
    
    #configure health check
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache      off;
        proxy_buffers    8 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffer_size 64k;
        client_max_body_size 10m;
        proxy_http_version 1.1;
        proxy_pass       http://localhost:8080/;
    }

    location /api/eventSourceBus {
        proxy_cache          off;
        proxy_buffering      off;
        proxy_read_timeout   86400s;
        proxy_send_timeout   86400s;
        proxy_set_header     Connection '';
        chunked_transfer_encoding off;
        proxy_set_header     X-Forwarded-Host $http_host;
        proxy_set_header     X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_http_version   1.1;
        proxy_pass           http://localhost:8080/api/eventSourceBus;
    }

    location /debug {
        proxy_set_header     X-Forwarded-Host $http_host;
        proxy_set_header     X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_http_version   1.1;
        proxy_set_header     Upgrade $http_upgrade;
        proxy_set_header     Connection "upgrade";
        proxy_pass           http://localhost:8080/debug;
        proxy_pass_header    Sec-Websocket-Extensions;
    }
}
         